name: CI

# The automated gate for the "Ways of Working" process: every PR (and every
# push to main) must build, test, and lint cleanly before it can be merged.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecosphere-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ecosphere-core/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
